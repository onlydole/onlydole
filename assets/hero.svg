<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Taylor Dolezal — Head of Open Source at Dosu · CNCF Ambassador · Los Angeles">
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d4f"/>
      <stop offset="55%" stop-color="#c2414f"/>
      <stop offset="100%" stop-color="#e8702a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="1200" height="300" rx="18"/>
    </clipPath>
  </defs>
  <rect width="1200" height="300" rx="18" fill="url(#sunset)"/>
  <g clip-path="url(#frame)">
    <rect x="-600" y="-40" width="420" height="380" fill="url(#sheen)" transform="skewX(-18)">
      <animate attributeName="x" values="-600;1560" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="64" y="132" font-family="-apple-system, &#39;Segoe UI&#39;, Ubuntu, Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff">Taylor Dolezal</text>
  <text x="64" y="184" font-family="-apple-system, &#39;Segoe UI&#39;, Ubuntu, Helvetica, Arial, sans-serif" font-size="25" fill="#ffe8dd">Head of Open Source @ Dosu · CNCF Ambassador · Los Angeles</text>
  <text x="64" y="228" font-family="-apple-system, &#39;Segoe UI&#39;, Ubuntu, Helvetica, Arial, sans-serif" font-size="19" fill="#ffd2bd" opacity="0.9">KubeCon keynoter · ex-Disney Studios SRE · ex-HashiCorp</text>
</svg>
