---
name: Lint

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          MARKDOWN_CONFIG_FILE: .markdownlint.yaml
          FILTER_REGEX_EXCLUDE: (assets/|tests/goldens/|tests/fixtures/|docs/superpowers/)
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_RUFF_FORMAT: false
          VALIDATE_JSCPD: false
          # README.md is generated by build.py; prettier fights the generator
          # on every bot refresh. markdownlint still validates it.
          VALIDATE_MARKDOWN_PRETTIER: false
