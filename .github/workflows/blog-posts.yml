---
name: Latest blog posts

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with latest posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull latest Substack posts into README
        uses: gautamkrishnar/blog-post-workflow@1.9.6
        with:
          feed_list: "https://onlydole.substack.com/feed"
          readme_path: "./README.md"
          max_post_count: 5
          commit_message: "chore: refresh latest blog posts"
